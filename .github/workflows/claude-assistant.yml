name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    if: |
      contains(github.event.comment.body, '@claude') ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Get PR branch
        id: pr-info
        uses: actions/github-script@v8
        with:
          script: |
            let branch = '';
            let prNumber = '';

            // For issue_comment on a PR
            if (context.eventName === 'issue_comment' && context.payload.issue.pull_request) {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number
              });
              branch = pr.head.ref;
              prNumber = pr.number;
            }
            // For pull_request_review_comment
            else if (context.eventName === 'pull_request_review_comment') {
              branch = context.payload.pull_request.head.ref;
              prNumber = context.payload.pull_request.number;
            }
            // For pull_request_review
            else if (context.eventName === 'pull_request_review') {
              branch = context.payload.pull_request.head.ref;
              prNumber = context.payload.pull_request.number;
            }

            core.setOutput('branch', branch);
            core.setOutput('pr_number', prNumber);
            core.setOutput('is_pr', branch ? 'true' : 'false');

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr-info.outputs.branch || github.ref }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.name "Claude"
          git config --global user.email "claude[bot]@users.noreply.github.com"

      - name: Claude Assistant Response
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          allowed_bots: "claude,claude[bot],dependabot[bot],renovate[bot]"
          prompt: |
            You are a helpful assistant for the Xenios platform.
            You can both ANSWER questions and FIX code when asked.

            ## Context
            This is a monorepo with:
            - Go backend (apps/backend) - Clean Architecture, raw SQL only
            - Next.js web app (apps/web) - Clean Architecture
            - React Native mobile app (apps/mobile) - Clean Architecture

            ## Architecture Rules (Must Follow)
            - Dependencies flow INWARD only
            - Domain layer has NO external dependencies
            - Backend is the ONLY app that accesses the database
            - Web and Mobile call Backend API, never database directly
            - No ORMs allowed in Backend (use pgx/raw SQL only)
            - Use TDD: write tests first, then implementation

            ## Current Branch Context
            You are on branch: ${{ steps.pr-info.outputs.branch || 'main' }}
            PR number: ${{ steps.pr-info.outputs.pr_number || 'N/A' }}
            Is PR: ${{ steps.pr-info.outputs.is_pr }}

            ## Your Capabilities

            ### Answering Questions
            When asked a question, read the relevant code and give concise, actionable answers.

            ### Fixing Code (When Asked)
            When someone asks you to fix something (review feedback, TDD failures, bugs, etc.):

            1. READ the PR comments and TDD reports to understand what needs fixing
            2. READ the relevant source and test files
            3. MAKE the necessary code changes
            4. RUN tests to verify: `go test ./...` for Go, `npm test` for TypeScript
            5. COMMIT with a descriptive message: `[Fix] <what was fixed>`
            6. PUSH to the PR branch: `git push origin ${{ steps.pr-info.outputs.branch }}`

            ### Fixing TDD Failures
            When asked to fix TDD failures:
            1. Find the latest TDD Quality Gate Report comment on this PR
            2. Read the report to understand what's failing (low coverage, missing tests, etc.)
            3. Read existing test files and implementation files
            4. Add missing tests (edge cases, error handling, boundary conditions)
            5. Ensure all tests pass
            6. Commit and push

            ## IMPORTANT: Non-Interactive Mode

            You are running in a CI environment with NO human interaction.
            - NEVER stop to ask for clarification - make reasonable assumptions
            - Respond directly to the comment or issue
            - If you need more context, read the relevant files in the repository
            - If asked to fix something, always complete the fix and push
          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-5-20250929
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch
