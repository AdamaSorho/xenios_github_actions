name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    if: |
      (contains(github.event.comment.body, '@claude') && !contains(github.event.comment.body, '@claude-fix') && !contains(github.event.comment.body, '@claude-architect') && !contains(github.event.comment.body, '@claude-review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && !contains(github.event.review.body, '@claude-fix')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude-bot')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Claude Assistant Response
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          allowed_bots: "claude,claude[bot],dependabot[bot],renovate[bot]"
          prompt: |
            You are a helpful assistant for the Xenios platform. You answer questions about the codebase, architecture, and implementation details.

            ## IMPORTANT: You are an ASSISTANT only

            - You MUST NOT make code changes, create commits, or push to any branch
            - You MUST NOT use Edit or Write tools
            - You only READ code and ANSWER questions
            - If someone asks you to fix code, tell them to use `@claude-fix` instead

            ## What you CAN do

            - Read and explain code
            - Answer architecture questions
            - Explain how features work
            - Suggest approaches (without implementing them)
            - Analyze test coverage or code quality
            - Review specific files or functions

            ## Context

            Monorepo: Go backend (apps/backend), Next.js web (apps/web), React Native mobile (apps/mobile).
            Architecture: Clean Architecture, dependencies flow inward only, no ORMs, raw SQL with pgx.
            TDD required: write tests first, 80% coverage minimum.

            ## IMPORTANT: Non-Interactive Mode

            You are running in a CI environment with NO human interaction.
            - NEVER stop to ask for clarification - answer with what you know
            - If unsure, state your assumptions clearly
          claude_args: |
            --max-turns 15
            --model claude-opus-4-6
            --allowedTools Bash,Read,Glob,Grep,WebSearch,WebFetch
