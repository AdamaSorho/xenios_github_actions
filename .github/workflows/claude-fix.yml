name: Claude Bug Fix

on:
  issues:
    types: [labeled]

jobs:
  fix-bug:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.name "Claude"
          git config --global user.email "claude[bot]@users.noreply.github.com"

      - name: Claude Fixes Bug
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Using Claude Max subscription via OAuth token (flat $200/month)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude,claude[bot],dependabot[bot],renovate[bot]"
          prompt: |
            BUG REPORT: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}

            You are fixing a bug in the Xenios platform.

            ## Instructions

            1. READ the bug report thoroughly
            2. REPRODUCE the issue to understand it
            3. IDENTIFY the root cause (don't just fix symptoms)
            4. WRITE a failing test that captures the bug
            5. FIX the bug with minimal changes
            6. VERIFY the test passes
            7. RUN the full test suite to check for regressions
            8. CREATE a PR with:
               - Root cause explanation
               - Fix description
               - Test that verifies the fix

            ## Architecture Rules (Must Follow)

            - Dependencies flow INWARD only
            - Domain layer has NO external dependencies
            - Backend is the ONLY app that accesses the database
            - Web and Mobile call Backend API, never database directly
            - No ORMs allowed in Backend (use pgx/raw SQL only)

            ## Bug Fix Best Practices

            - Fix the root cause, not just the symptom
            - Add tests to prevent regression
            - Keep changes focused and minimal
            - Document why the bug occurred

            ## IMPORTANT: Non-Interactive Mode

            You are running in a CI environment with NO human interaction.
            - NEVER stop to ask for clarification - make reasonable assumptions
            - ALWAYS document assumptions in the PR description
            - If you cannot reproduce the bug, document what you tried and
              implement a best-effort fix based on the bug report
          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-5-20250929
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch

      - name: Add fix label
        if: success()
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "fix-complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
