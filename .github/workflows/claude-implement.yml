name: Claude Feature Implementation

on:
  issues:
    types: [labeled]

jobs:
  implement-feature:
    if: github.event.label.name == 'claude-implement'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config --global user.name "Claude"
          git config --global user.email "claude[bot]@users.noreply.github.com"

      - name: Claude Implements Feature
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Using Claude Max subscription via OAuth token (flat $200/month)
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude,claude[bot],dependabot[bot],renovate[bot]"
          prompt: |
            ISSUE: #${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}

            You are implementing a feature for the Xenios platform.

            ## Implementation Steps (follow in order)

            1. READ the issue description and `docs/spec-template.md` thoroughly
            2. IDENTIFY which app(s) need changes (backend, web, mobile)
            3. FOLLOW Test-Driven Development:
               - Write failing tests FIRST
               - Implement minimum code to pass tests
               - Refactor while keeping tests green
            4. ENFORCE Clean Architecture (see rules below)
            5. RUN the pre-PR validation script and fix ALL failures before creating the PR
            6. CREATE a PR only after the validation script passes with 0 failures

            ## MANDATORY: Pre-PR Validation (do this before creating the PR)

            You MUST run this script and fix every failure before opening the PR:
            ```bash
            ./scripts/pre-pr-check.sh
            ```

            This script checks:
            - Compilation (go build)
            - Clean Architecture violations
            - Migration number conflicts
            - Test pass/fail
            - Coverage ≥ 80%

            **DO NOT create the PR if this script reports any failures.**
            Fix the issues, re-run the script, and only proceed when output shows 0 failures.

            ## MANDATORY: Migration Number Check

            If your feature requires new database migrations, you MUST:
            1. Check the latest existing migration number FIRST:
               ```bash
               ls apps/backend/migrations/*.up.sql | sort | tail -1
               ```
            2. Use the NEXT sequential number (e.g., if latest is 000011, use 000012)
            3. NEVER guess the migration number — always check

            Multiple builders run in parallel and will all pick the same number if they
            don't check. The pre-PR script will catch this, but checking first saves time.

            ## MANDATORY: Coverage Verification

            After writing tests, verify coverage before creating the PR:
            ```bash
            cd apps/backend
            go test -coverprofile=coverage.out ./...
            go tool cover -func=coverage.out | grep "^total:"
            ```

            Coverage MUST be ≥ 80% for all new code. If below 80%:
            - Identify uncovered lines: `go tool cover -html=coverage.out`
            - Add tests for uncovered error paths, edge cases, and boundary conditions
            - Focus on: error returns, nil checks, invalid input handling

            ## MANDATORY: No Code Duplication (SonarCloud enforces ≤ 3%)

            SonarCloud will FAIL the PR if new code duplication exceeds 3%.
            Before creating the PR, review your code for:
            - Repeated validation logic → extract into a shared `validate*()` helper
            - Repeated error wrapping → extract into a shared `newError()` helper
            - Identical handler constructors → embed a base struct or use a factory
            - Repeated audit logging calls → extract into a shared `logEvent()` helper
            - Copy-pasted HTTP response patterns → extract into `respondJSON()` / `respondError()`

            Rule of thumb: if you wrote the same block of code 2+ times, extract it.

            ## Sequence Diagram Requirements

            Every PR MUST include a Mermaid sequence diagram in the description:
            ```mermaid
            sequenceDiagram
                participant U as User
                participant M as Mobile App
                participant B as Backend API
                participant DB as Database

                U->>M: Tap login button
                M->>B: POST /auth/login
                B->>DB: Query user by email
                DB-->>B: User record
                B->>B: Validate password
                alt Valid credentials
                    B-->>M: 200 OK + JWT token
                    M-->>U: Navigate to home
                else Invalid credentials
                    B-->>M: 401 Unauthorized
                    M-->>U: Show error message
                end
            ```

            ## Architecture Rules

            - Dependencies flow INWARD only
            - Domain layer has NO external dependencies
            - Use cases call repository interfaces, not implementations
            - Handlers/Controllers are thin - delegate to use cases

            ## Database Rules (CRITICAL)

            - ONLY the Backend (Go) accesses the database (Supabase/PostgreSQL)
            - Web and Mobile NEVER access database directly - they call Backend APIs
            - NO ORMs allowed - use raw SQL with pgx/sqlx
            - Repository INTERFACES in domain layer (no DB imports)
            - Repository IMPLEMENTATIONS in infrastructure layer
            - FORBIDDEN in Backend: GORM, Prisma, TypeORM, Drizzle, Ent
            - FORBIDDEN in Web/Mobile: ANY database library (@supabase, pg, etc.)
            - Always use parameterized queries ($1, $2) for SQL injection prevention

            ## TDD Rules

            - Write tests BEFORE implementation (red → green → refactor)
            - Test naming: `Test<Function>_<Scenario>_<Expected>`
            - Test files: `*_test.go` (Go), `*.test.ts` (TypeScript)
            - Minimum 80% coverage — verified with coverage tool, not estimated

            ## Version Verification (CRITICAL)

            Your knowledge about package versions may be OUTDATED.
            Before using ANY specific version:
            1. Check existing project files (package.json, go.mod, .nvmrc)
            2. Use WebSearch to verify current LTS/stable versions
            3. If uncertain, document your assumption in the PR description

            ## IMPORTANT: Non-Interactive Mode

            You are running in a CI environment with NO human interaction.
            - NEVER stop to ask for clarification - make reasonable assumptions
            - ALWAYS document assumptions in the PR description
            - If requirements are ambiguous, choose the most common/standard approach
            - If you encounter a blocker, document it in a PR comment and implement
              as much as possible
          claude_args: |
            --max-turns 200
            --model claude-opus-4-6
            --allowedTools Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch

      - name: Add implementation label
        if: success()
        run: |
          gh issue edit ${{ github.event.issue.number }} --add-label "implementation-complete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
