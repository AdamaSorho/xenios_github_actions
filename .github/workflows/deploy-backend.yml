name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/backend/**'
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: xenios_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for SonarCloud blame

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Setup test database
        env:
          PGPASSWORD: postgres
        run: |
          # Create service_role for RLS policies (Supabase compatibility)
          psql -h localhost -U postgres -d xenios_test -c "CREATE ROLE service_role;" || true

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/xenios_test?sslmode=disable
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path migrations -database "$DATABASE_URL" up

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/xenios_test?sslmode=disable
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: apps/backend/coverage.out
          flags: backend
          name: backend-coverage

      - name: Run Snyk security scan
        uses: snyk/actions/golang@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=apps/backend/go.mod

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/backend

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set staging secrets
        run: flyctl secrets set DATABASE_URL="${{ secrets.STAGING_DATABASE_URL }}" --app xenios-api-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to staging
        working-directory: apps/backend
        run: |
          # Create staging config if it doesn't exist
          if [ ! -f fly.staging.toml ]; then
            cp fly.toml fly.staging.toml
            sed -i 's/xenios-api/xenios-api-staging/g' fly.staging.toml
          fi
          flyctl deploy --local-only --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f https://xenios-api-staging.fly.dev/api/health || exit 1

  deploy-production:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.xenios.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set production secrets
        run: flyctl secrets set DATABASE_URL="${{ secrets.PRODUCTION_DATABASE_URL }}" --app xenios-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to production
        working-directory: apps/backend
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f https://api.xenios.app/api/health || exit 1
