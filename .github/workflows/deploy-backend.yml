name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        working-directory: apps/backend
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: apps/backend/coverage.out
          flags: backend
          name: backend-coverage

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to staging
        working-directory: apps/backend
        run: |
          # Create staging config if it doesn't exist
          if [ ! -f fly.staging.toml ]; then
            cp fly.toml fly.staging.toml
            sed -i 's/xenios-api/xenios-api-staging/g' fly.staging.toml
          fi
          flyctl deploy --local-only --config fly.staging.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f https://xenios-api-staging.fly.dev/health || exit 1

  deploy-production:
    needs: test
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.xenios.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to production
        working-directory: apps/backend
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 10
          curl -f https://api.xenios.app/health || exit 1
