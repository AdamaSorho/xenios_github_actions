name: Deploy Mobile

# Disabled until EAS credentials (iOS/Android signing) are configured.
# To re-enable, uncomment the push and pull_request triggers below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/mobile/**'
  #     - 'packages/**'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'apps/mobile/**'
  #     - 'packages/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --workspace=apps/mobile

      - name: Run lint
        run: npm run lint --workspace=apps/mobile || true

      - name: Run typecheck
        run: npm run typecheck --workspace=apps/mobile

  build-android:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android (Preview)
        working-directory: apps/mobile
        run: |
          eas build --platform android --profile preview --non-interactive

  build-ios:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS (Preview)
        working-directory: apps/mobile
        run: |
          eas build --platform ios --profile preview --non-interactive

  # Note: Production builds require manual app store submission
  # This workflow handles build and testing only
