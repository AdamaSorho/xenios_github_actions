name: Database Migrations

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/migrations/**'
  workflow_dispatch: # Allow manual trigger

jobs:
  migrate-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install golang-migrate
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run Migrations (Staging)
        id: migrate_up
        run: |
          migrate -path apps/backend/migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        continue-on-error: true

      - name: Retry Migration (Rollback + Up)
        if: steps.migrate_up.outcome == 'failure'
        run: |
          echo "Migration failed. Attempting recovery..."

          # Get current version and check if dirty
          CURRENT_VERSION=$(migrate -path apps/backend/migrations -database "$DATABASE_URL" version 2>&1 || echo "dirty")

          if echo "$CURRENT_VERSION" | grep -q "dirty"; then
            echo "Database is dirty. Extracting version number..."
            DIRTY_VERSION=$(echo "$CURRENT_VERSION" | grep -oP '(?<=version )\d+')
            echo "Forcing clean version $(($DIRTY_VERSION - 1))..."
            migrate -path apps/backend/migrations -database "$DATABASE_URL" force $(($DIRTY_VERSION - 1))
          fi

          # Wait a moment for DB to settle
          sleep 2

          # Retry the migration
          migrate -path apps/backend/migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Verify Migration Success
        run: |
          echo "Staging migrations completed successfully"

  migrate-production:
    needs: migrate-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      # Requires manual approval in GitHub Environment settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install golang-migrate
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run Migrations (Production)
        id: migrate_up_prod
        run: |
          migrate -path apps/backend/migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        continue-on-error: true

      - name: Retry Migration (Rollback + Up)
        if: steps.migrate_up_prod.outcome == 'failure'
        run: |
          echo "Migration failed. Attempting recovery..."

          # Get current version and check if dirty
          CURRENT_VERSION=$(migrate -path apps/backend/migrations -database "$DATABASE_URL" version 2>&1 || echo "dirty")

          if echo "$CURRENT_VERSION" | grep -q "dirty"; then
            echo "Database is dirty. Extracting version number..."
            DIRTY_VERSION=$(echo "$CURRENT_VERSION" | grep -oP '(?<=version )\d+')
            echo "Forcing clean version $(($DIRTY_VERSION - 1))..."
            migrate -path apps/backend/migrations -database "$DATABASE_URL" force $(($DIRTY_VERSION - 1))
          fi

          # Wait a moment for DB to settle
          sleep 2

          # Retry the migration
          migrate -path apps/backend/migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Verify Migration Success
        run: |
          echo "Production migrations completed successfully"
